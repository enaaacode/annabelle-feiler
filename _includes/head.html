<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>
  {% if page.title %} {{ site.title }} | {{ page.title }}{% else %} {{
  site.title }} {% endif %}
</title>

<link
  rel="icon"
  href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐊</text></svg>"
/>

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />

<meta
  name="description"
  content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}"
/>

<meta name="keywords" content="Art, Künstlerin, Leipzig, Design" />
<meta name="author" content="sss" />
